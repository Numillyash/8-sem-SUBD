services:
  postgres-lab4:
    image: postgres:16
    container_name: subd_lab4_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: subd_lab4
      POSTGRES_USER: lab4user
      POSTGRES_PASSWORD: lab4pass
    ports:
      - "15434:5432"
    volumes:
      - subd_lab4_data:/var/lib/postgresql/data

volumes:
  subd_lab4_data:
